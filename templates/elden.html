<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <!--BootStrapを利用-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
        <style>
            /* 背景画像フィルター */
            .over img:first-child {
                filter: blur(25px);
                object-fit: cover;
                opacity: 0.8;
                transform: scale(1.5);
                width: 100%;
                height: auto;
            }
            
            /* 中央寄せ */
            .over img:last-child {
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
                position: absolute;
                width: 45%;
                height: auto;
            }
            
            /* 表示画像比率 */
            .over {
                aspect-ratio: 18 / 3.5;
                overflow: hidden;
                position: relative;
                width: 100%;
            }
            .center-block {
                margin-left: 10%;
                margin-right: 10%;
            }
        </style>
    </head>
    <body>
        <div class="image-container">
            <div class="over">
                <img src="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1245620/header.jpg?t=1737724597">
                <img src="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1245620/header.jpg?t=1737724597">
            </div>

        <div class="container">
            <h2 class="my-4">ELDEN RING</h2>
            <br>
            本作は、本格的なダークファンタジーの世界を舞台にしたアクションRPGタイトルです。広大なフィールドとダンジョン探索による未知の発見。立ちはだかる困難と、それを乗り越えた時の達成感。そして、登場人物たちの思惑が交錯する群像劇をお楽しみいただけます。
            <br><br>
            <div class="text-center">
                <video id="movie" class="mb-4" src="http://video.akamai.steamstatic.com/store_trailers/256889456/movie_max_vp9.webm?t=1654109241" poster="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/256889456/movie.293x165.jpg?t=1654109241" type="video/webm" style="width: 65%; height: auto;" controls allowfullscreen></video>
